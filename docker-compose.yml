services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: onibus-express-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=OniBus@Express123
    ports:
      - "1433:1433"
    volumes:
      - onibus-express-db-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: src/Backend/OniBusExpress.API/Dockerfile
    container_name: onibus-express-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=db;Database=OniBusExpress;User Id=sa;Password=OniBus@Express123;TrustServerCertificate=True;
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - EMAIL_FROM=${EMAIL_FROM}
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./src/Frontend/onibus-express-web
      dockerfile: Dockerfile
    container_name: onibus-express-web
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  onibus-express-db-data:
